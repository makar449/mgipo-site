name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAGES: "true"
      NEXT_PUBLIC_STATIC_EXPORT: "true"
      DATABASE_URL: "file:./dev.db"
      NEXT_PUBLIC_SITE_URL: "https://makar449.github.io/mgipo-site"
      NEXT_TELEMETRY_DISABLED: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.5

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.15.4 --activate

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile --prefer-offline=false

      - name: Generate Prisma Client
        run: pnpm exec prisma generate

      - name: Prepare static GitHub Pages build
        run: |
          rm -rf src/app/api
          rm -rf .local-data
          rm -f dev.db dev.db-journal
          if grep -R "Рџ\|Р’\|СЂР\|С‚Р" -n src app public 2>/dev/null; then
            echo "Mojibake/corrupted Cyrillic text detected. Refusing to deploy broken encoding."
            exit 1
          fi

      - name: Build static site
        run: pnpm exec next build

      - name: Upload static export
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
